<!doctype html>
<html>
  <head>
    <title>Home</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/navbar.css" />
    <link rel="stylesheet" href="./css/home.css" />
  </head>
  <body>
    <div class="main-hero-section">
      
      <div class="main-container">
        <div class="img-container">
          <img
            src="./images/main-logo-img-4.png"
            alt="logo"
            class="main-logo-img"
          />
          <h1 class="website-name">
            <span style="color: rgb(240, 162, 53)">Explore</span>
            <span style="color: rgb(125, 231, 214)">the Heart of</span>
            <span style="color: orange"><b> महाराष्ट्र</b></span>
          </h1>
        </div>
        <div class="nav-menu">
          <a href="./index.html" class="menu">Home</a>
          <a href="./pages/places.html" class="menu">Places</a>
          <a href="./plan-trip.html" class="menu">plan Trip</a>
          <a href="./contact.html" class="menu">Contact</a>
        </div>
       
      </div>
      <div class="main-content">
        <div class="highlighted-main-content">
          <span class="highlighted-words">
            <img src="./images/explore-icon.svg" height="20px" alt="Explore" />
            EXPLORE
          </span>
          <span class="highlighted-words">
            <img
              src="./images/experience-icon.svg"
              height="20px"
              alt="Experience"
            />
            EXPERIENCE
          </span>
          <span class="highlighted-words">
            <img src="./images/enjoy-icon.svg" height="20px" alt="Enjoy" />
            ENJOY
          </span>
        </div>
        <div class="sub-content">
          <h1>Discover the beauty, history, and culture of Maharashtra.</h1>
        </div>

        <div class="destination-container">
          <div class="destination-container-icons">
            <img src="./images/location-icon.svg" height="20px" alt="Search" />
            <input
              class="input-container"
              type="text"
              placeholder="search for destination, activities, or experiences"
            />
          </div>

          <div class="destination-container-icons">
            <img src="./images/date-icon.svg" height="20px" alt="Calendar" />
            <input class="input-container" type="date" />
          </div>

          <div class="destination-container-icons">
            <img src="./images/people-icon.svg" height="20px" alt="People" />
            <input
              class="input-container"
              type="number"
              placeholder="number of people"
            />
          </div>

          <div class="destination-container-icons">
            <img src="./images/search-icon.svg" height="20px" alt="Search" />
            <button class="btn-search">Search</button>
          </div>
        </div>
        <div class="statistics-container">

          <div  class="statistics-value"> 
           <span class="statistics-number"> 500+ </span> 
           <span>Destinations</span> 
          </div>

          <div  class="statistics-value">
            <span class="statistics-number">50k</span>
            <span> Happy Customers</span>
          </div>

          <div class="statistics-value">
            <span class="statistics-number">10+</span>
            <span> Experiences</span>
          </div>

          <div  class="statistics-value">
            <span class="statistics-number">4.5 <img src="./images/star-icon.svg" height="30px"/> </span>
            <span> Rating</span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
